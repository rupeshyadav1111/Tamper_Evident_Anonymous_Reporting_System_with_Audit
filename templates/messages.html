<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-container {
    width: 100%;
    max-width: 700px;
    height: 90vh;
    background: white;
    display: flex;
    flex-direction: column;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
}
.chat-header {
    padding: 15px 20px;
    background: #2a5298;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.status-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.status-badge.SUBMITTED { background: #2196F3; }
.status-badge.UNDER_REVIEW { background: #ff9800; }
.status-badge.CLOSED { background: #4CAF50; }
.status-badge.TAMPERED { background: #f44336; }
.chat-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: #f9fbff;
}
.message {
    margin-bottom: 12px;
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    position: relative;
    animation: fadeIn 0.3s ease;
}

.user {
    background: #e3f2fd;
    align-self: flex-end;
}

.admin {
    background: #fff3e0;
    align-self: flex-start;
}

.system {
    background: #ffebee;
    align-self: center;
    text-align: center;
    font-weight: bold;
}

.timestamp {
    font-size: 10px;
    margin-top: 4px;
    opacity: 0.6;
}
.chat-input {
    padding: 15px;
    border-top: 1px solid #ddd;
    background: white;
    display: flex;
    gap: 10px;
}

textarea {
    flex: 1;
    resize: none;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    height: 50px;
    transition: 0.3s;
}

textarea:focus {
    border-color: #2a5298;
    outline: none;
    box-shadow: 0 0 5px rgba(42,82,152,0.3);
}

button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #2a5298;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1e3c72;
}

button:disabled {
    background: #999;
    cursor: not-allowed;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        <div>Anonymous Conversation</div>
        <div class="status-badge {{ status }}">
            {{ status.replace("_", " ").title() }}
        </div>
    </div>
    <div class="chat-messages" id="chatBox">
        {% for m in messages %}
    <div class="message {{ m[0] }}">

        <div style="font-size:11px; font-weight:bold; margin-bottom:4px; opacity:0.7;">
            {% if m[0] == "user" %}
                YOU
            {% elif m[0] == "admin" %}
                ADMIN
            {% elif m[0] == "system" %}
                SYSTEM
            {% else %}
                {{ m[0]|upper }}
            {% endif %}
        </div>

        <div>{{ m[1] }}</div>

        <div class="timestamp">{{ m[2] }}</div>

    </div>
{% endfor %}
    </div>
    <form method="POST" class="chat-input" onsubmit="return handleSend()">
        <textarea name="message" id="messageInput"
                  placeholder="Type your message..."
                  {% if status == "CLOSED" or status == "TAMPERED" %}disabled{% endif %}
                  required></textarea>

        <button type="submit"
            {% if status == "CLOSED" or status == "TAMPERED" %}disabled{% endif %}>
            Send
        </button>
    </form>

</div>

<script>
const chatBox = document.getElementById("chatBox");
chatBox.scrollTop = chatBox.scrollHeight;
document.getElementById("messageInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        this.form.submit();
    }
});

function handleSend() {
    const input = document.getElementById("messageInput");
    if (input.value.trim().length < 1) return false;
    return true;
}
</script>

</body>
</html>
